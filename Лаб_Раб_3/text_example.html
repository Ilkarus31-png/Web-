<html>
  <head>
    <title>Таблица</title>
  </head>
  <body>
    <table border=1>
      <colgroup>
        <col span="2" style="background:Lime">
        <col style="background-color:LightCyan">
      </colgroup>
      <tr>
        <th>A</th>
        <th>B</th>
        <th>C</th>
      </tr>
      <tr>
        <td>1</td>
        <td>2</td>
        <td>3</td>
      </tr>
    </table>
  </body>
</html>
